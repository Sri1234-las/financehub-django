{% extends 'finance/base.html' %}
{% block auth_content %}
<div style="min-height:100vh; background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%); display:flex; align-items:center; justify-content:center;">
    <div class="card p-4" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <div style="font-size:2.5rem;">💰</div>
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted">Login to your FinanceHub</p>
        </div>
        {% if form.errors %}
        <div class="alert alert-danger">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
        </form>
        <p class="text-center mt-3 mb-0">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
